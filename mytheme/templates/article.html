{% extends "base.html" %}

{% block title %}{{ article.title }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ SITEURL }}/theme/static/css/article.css">
{% endblock %}

{% block content %}

<div class="article-container">

    <h1>{{ article.title }}</h1>
    <div class="date">{{ article.date.strftime('%Y/%m/%d') }}</div>

    {{ article.content }}

</div>
 
{% endblock %}
